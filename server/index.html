<!doctype html>
<html>
    <head>
        <meta name="viewport" content="width=device-width, initial-scale=1" />
        <title>Gray</title>
    </head>
    <body style="background-color: gray">
        <code id="error" style="color: red; background-color: white"></code>
        <canvas
            id="canvas"
            style="
                position: absolute;
                top: 0;
                left: 0;
                width: 100%;
                height: 100%;
                overflow: hidden;
            "
        ></canvas>
        <script>
            const canvas = document.getElementById("canvas");
            const ctx = canvas.getContext("2d");
            canvas.width = window.innerWidth;
            canvas.height = window.innerHeight;

            let img = ctx.createImageData(canvas.width, canvas.height);
            function dot(x, y, r, g, b) {
                const i = (y * canvas.width + x) * 4;
                img.data[i + 0] = r;
                img.data[i + 1] = g;
                img.data[i + 2] = b;
                img.data[i + 3] = 255;
            }

            let ws;
            function listenWS() {
                ws = new WebSocket(`ws://localhost:8080/ws`);
                ws.binaryType = "arraybuffer";

                ws.onopen = () => {
                    updateConfig();
                };

                ws.onmessage = (ev) => {
                    const buf = ev.data;
                    const dataView = new DataView(buf);
                    // process 7 bytes per dot (x,y: 2 bytes, r,g,b: 1 byte)
                    for (let offset = 0; offset < buf.byteLength; offset += 7) {
                        const x = dataView.getUint16(offset, true); // little-endian
                        const y = dataView.getUint16(offset + 2, true);
                        const r = dataView.getUint8(offset + 4);
                        const g = dataView.getUint8(offset + 5);
                        const b = dataView.getUint8(offset + 6);

                        dot(x, y, r, g, b);
                    }
                    ctx.putImageData(img, 0, 0);
                };

                ws.onerror = (ev) => {
                    document.getElementById("error").innerText =
                        "WebSocket connection error";
                };
            }

            let config = {
                fromX: 13.0,
                fromY: 2.0,
                fromZ: 3.0,
            };
            function updateConfig() {
                if (ws.readyState !== WebSocket.OPEN) return;
                const numFields = 8;
                const buf = new ArrayBuffer(numFields * 4);
                const view = new DataView(buf);
                view.setUint32(0, canvas.width, true); // little-endian
                view.setUint32(4, canvas.height, true);
                view.setFloat32(8, config.fromX, true);
                view.setFloat32(12, config.fromY, true);
                view.setFloat32(16, config.fromZ, true);

                ws.send(buf);
            }

            window.addEventListener("keydown", onKeyDown);
            function onKeyDown(ev) {
                const delta = 0.25;
                switch (ev.key) {
                    case "ArrowLeft":
                        config.fromX -= delta;
                        break;
                    case "ArrowRight":
                        config.fromX += delta;
                        break;
                    case "ArrowUp":
                        if (ev.shiftKey) config.fromZ += delta;
                        else config.fromY += delta;
                        break;
                    case "ArrowDown":
                        if (ev.shiftKey) config.fromZ -= delta;
                        else config.fromY -= delta;
                        break;
                    case "o":
                        config.fromX = 0;
                        config.fromY = 0;
                        config.fromZ = 0;
                        break;
                    default:
                        return;
                }
                config.fromY = Math.max(0, config.fromY);
                updateConfig();
            }

            window.addEventListener("resize", onResize);
            function onResize() {
                canvas.width = window.innerWidth;
                canvas.height = window.innerHeight;
                img = ctx.createImageData(canvas.width, canvas.height);
                updateConfig();
            }

            listenWS();
        </script>
    </body>
</html>
